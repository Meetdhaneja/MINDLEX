# model.yaml is an open standard for defining cross-platform, composable AI models
# Learn more at https://modelyaml.org
model: nvidia/nemotron-3-nano-4b
base:
  - key: lmstudio-community/nvidia-nemotron-3-nano-4b-gguf
    sources:
      - type: huggingface
        user: lmstudio-community
        repo: NVIDIA-Nemotron-3-Nano-4B-GGUF
customFields:
  - key: enableThinking
    displayName: Enable Thinking
    description: Controls whether the model will think before replying
    type: boolean
    defaultValue: true
    effects:
      - type: setJinjaVariable
        variable: enable_thinking
  - key: truncateThinkingHistory
    displayName: Truncate Thinking History
    description: Controls whether thinking history will be truncated to save context space
    type: boolean
    defaultValue: true
    effects:
      - type: setJinjaVariable
        variable: truncate_history_thinking
metadataOverrides:
  domain: llm
  architectures:
    - nemotron_h
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 4B
  minMemoryUsageBytes: 4500000000
  contextLengths:
    - 262144
  vision: false
  reasoning: true
  trainedForToolUse: true
